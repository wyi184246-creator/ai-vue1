[[redirects]]
from = "/api/*"
to = "http://159.75.169.224:1235/api/:splat"
status = 200
force = true

[[redirects]]
from = "/profile/*"
to = "http://159.75.169.224:1235/profile/:splat"
status = 200
force = true

[[redirects]]
from = "/upload/*"
to = "http://159.75.169.224:1235/upload/:splat"
status = 200
force = true

[[redirects]]
from = "/uploads/*"
to = "http://159.75.169.224:1235/uploads/:splat"
status = 200
force = true

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[[headers]]
for = "/index.html"
[headers.values]
Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
for = "/*"
[headers.values]
Cache-Control = "no-cache"

[[headers]]
for = "/assets/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"
